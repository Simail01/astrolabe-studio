appId: com.astrolabe.studio
productName: 星盘工坊
copyright: Copyright © 2024 Astrolabe Studio

directories:
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - from: "../ai"
    to: "node_modules/@astrolabe/ai"
    filter:
      - "package.json"
      - "dist/**/*"
  - "!node_modules/**/{test,tests,__tests__}/**"
  - "!node_modules/**/*.{md,ts,map}"

extraResources:
  - from: "../ai/dist/prompts"
    to: "prompts"
  - from: "resources/examples"
    to: "examples"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: "../../build/icon.ico"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 星盘工坊
  installerIcon: "../../build/icon.ico"
  uninstallerIcon: "../../build/icon.ico"
  installerHeaderIcon: "../../build/icon.ico"
  deleteAppDataOnUninstall: false

asar: true
asarUnpack:
  - "node_modules/chokidar/**/*"

publish:
  provider: github
  owner: Simail01
  repo: astrolabe-studio
