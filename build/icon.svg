<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#2d2f45"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a847"/>
      <stop offset="100%" style="stop-color:#b08d57"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Astrolabe circle -->
  <circle cx="128" cy="128" r="80" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="128" cy="128" r="60" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="128" cy="128" r="40" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <!-- Cross lines -->
  <line x1="128" y1="48" x2="128" y2="208" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="48" y1="128" x2="208" y2="128" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <!-- Diagonal lines -->
  <line x1="71" y1="71" x2="185" y2="185" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="185" y1="71" x2="71" y2="185" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- Center star -->
  <circle cx="128" cy="128" r="8" fill="url(#gold)"/>
  <!-- Pointer -->
  <polygon points="128,48 134,128 128,134 122,128" fill="url(#gold)" opacity="0.8"/>
  <!-- Chinese text -->
  <text x="128" y="230" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#b08d57">星盘工坊</text>
</svg>
